name: Tritium runtime verify

on:
  pull_request:
    paths:
      - "runtime/**"
      - ".github/workflows/tritium-verify.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install runtime deps
        working-directory: runtime/server
        run: npm ci || npm install
      - name: Run smoke test
        working-directory: runtime/server
        run: node src/verify.js
